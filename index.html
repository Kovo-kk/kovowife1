<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kovowife - AI智能对话</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 登录/注册遮罩 -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-container">
      <div class="auth-header">
        <h1>🤖 Kovowife</h1>
        <p>AI智能对话平台</p>
      </div>
      <form class="auth-form active" id="loginForm">
        <h2>登录账号</h2>
        <div class="input-group">
          <label>用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="username" required>
        </div>
        <div class="input-group">
          <label>密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn-primary">登 录</button>
        <p class="auth-switch">还没有账号？<a href="#" id="showRegister">立即注册</a></p>
      </form>
      <form class="auth-form" id="registerForm">
        <h2>注册账号</h2>
        <div class="input-group">
          <label>用户名</label>
          <input type="text" id="regUsername" placeholder="3-20个字符" autocomplete="username" required minlength="3" maxlength="20">
        </div>
        <div class="input-group">
          <label>密码</label>
          <input type="password" id="regPassword" placeholder="至少6位密码" autocomplete="new-password" required minlength="6">
        </div>
        <div class="input-group">
          <label>确认密码</label>
          <input type="password" id="regPasswordConfirm" placeholder="再次输入密码" autocomplete="new-password" required>
        </div>
        <div class="auth-error" id="regError"></div>
        <button type="submit" class="btn-primary">注 册</button>
        <p class="auth-switch">已有账号？<a href="#" id="showLogin">返回登录</a></p>
      </form>
    </div>
  </div>

  <!-- 主界面 -->
  <div class="app-container" id="appContainer" style="display:none;">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>🤖 Kovowife</h2>
        <button class="btn-icon" id="sidebarToggle" title="收起侧边栏">☰</button>
      </div>
      <button class="btn-new-chat" id="btnNewChat">+ 新建对话</button>
      <div class="conversation-list" id="conversationList"></div>
      <div class="sidebar-footer">
        <button class="btn-sidebar" id="btnSettings"><span>⚙️</span> API设置</button>
        <button class="btn-sidebar" id="btnLogout"><span>🚪</span> 退出登录</button>
        <div class="user-info">
          <span class="user-avatar">👤</span>
          <span id="displayUsername"></span>
        </div>
      </div>
    </aside>

    <main class="chat-main">
      <div class="chat-header">
        <button class="btn-icon" id="sidebarToggleMobile" title="菜单">☰</button>
        <h3 id="chatTitle">选择或新建一个对话</h3>
        <span class="mode-badge" id="modeBadge">离线模式</span>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="welcome-screen">
          <div class="welcome-icon">🤖</div>
          <h2>欢迎使用 Kovowife AI助手</h2>
          <p>点击左侧"新建对话"开始与AI交流</p>
          <div class="welcome-tips">
            <div class="tip-item" data-prompt="帮我写一段Python代码">💻 帮我写一段Python代码</div>
            <div class="tip-item" data-prompt="解释一下什么是机器学习">📚 解释一下什么是机器学习</div>
            <div class="tip-item" data-prompt="帮我翻译一段英文">🌐 帮我翻译一段英文</div>
            <div class="tip-item" data-prompt="写一份工作周报模板">📝 写一份工作周报模板</div>
          </div>
        </div>
      </div>
      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <textarea id="chatInput" placeholder="输入消息，Enter发送，Shift+Enter换行..." rows="1"></textarea>
          <button class="btn-send" id="btnSend" title="发送">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
        <p class="input-hint">Enter发送 | Shift+Enter换行</p>
      </div>
    </main>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal-overlay" id="settingsModal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚙️ API 设置</h3>
        <button class="btn-close" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>API 地址</label>
          <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions">
          <span class="input-desc">支持OpenAI及兼容接口（Ollama、vLLM等）</span>
        </div>
        <div class="input-group">
          <label>API 密钥</label>
          <input type="password" id="apiKey" placeholder="sk-...">
        </div>
        <div class="input-group">
          <label>模型名称</label>
          <input type="text" id="modelName" placeholder="gpt-3.5-turbo">
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="testConnection">测试连接</button>
          <button class="btn-primary" id="saveSettings">保存设置</button>
        </div>
        <div id="settingsMsg"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
